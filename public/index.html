<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#2f6feb">
<link rel="manifest" href="/manifest.webmanifest">
<title>Workouts</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header>
    <h1>Workouts</h1>
    <button id="logout" type="button" hidden>Log out</button>
  </header>

  <section id="login" hidden>
    <form id="login-form">
      <label for="login-pw">Password</label>
      <input id="login-pw" type="password" autocomplete="current-password" required>
      <button type="submit">Log in</button>
      <p id="login-err" role="alert"></p>
    </form>
  </section>

  <main id="app" hidden>
    <p id="resume-banner" class="banner" hidden></p>

    <section id="home" class="view">
      <h2>Start a session</h2>
      <div id="template-list"></div>
      <div class="home-actions">
        <button id="new-template" type="button" class="secondary">New template</button>
        <button id="manage-templates" type="button" class="secondary">Manage templates</button>
        <button id="open-history" type="button" class="secondary">View history</button>
      </div>
    </section>

    <section id="new-tpl" class="view" hidden>
      <button id="new-tpl-back" type="button" class="secondary back-btn">&larr; Back</button>
      <h2>New template</h2>
      <form id="new-tpl-form">
        <label class="field">
          <span>Name</span>
          <input id="nt-name" type="text" required maxlength="100" autocomplete="off">
        </label>

        <fieldset class="mode">
          <legend>Mode</legend>
          <label><input type="radio" name="nt-mode" value="sets" checked> Sets (one metric, N fixed sets)</label>
          <label><input type="radio" name="nt-mode" value="rows"> Rows (named columns, add rows during session)</label>
        </fieldset>

        <div id="nt-sets" class="mode-panel">
          <label class="field">
            <span>Metric name</span>
            <input id="nt-metric" type="text" maxlength="50" placeholder="e.g. reps" autocomplete="off">
          </label>
          <label class="field">
            <span>Unit (optional)</span>
            <input id="nt-unit" type="text" maxlength="20" placeholder="e.g. pounds" autocomplete="off">
          </label>
          <label class="field">
            <span>Number of sets</span>
            <input id="nt-sets-count" type="number" inputmode="numeric" min="1" max="100" value="4">
          </label>
        </div>

        <div id="nt-rows" class="mode-panel" hidden>
          <div class="col-builder-header">
            <span>Columns</span>
            <button id="nt-add-col" type="button" class="secondary small">+ Add column</button>
          </div>
          <div id="nt-col-builder"></div>
          <p class="muted">Text lets you enter anything (e.g. <code>20:00</code>). Number shows the numeric keypad.</p>
        </div>

        <p id="nt-err" class="err" role="alert"></p>
        <div class="form-actions">
          <button id="nt-submit" type="submit">Save template</button>
        </div>
      </form>
    </section>

    <section id="manage" class="view" hidden>
      <button id="manage-back" type="button" class="secondary back-btn">&larr; Back</button>
      <h2>Manage templates</h2>
      <div id="manage-list"></div>
      <p id="manage-empty" class="muted" hidden>No templates yet.</p>
    </section>

    <section id="session" class="view" hidden>
      <button id="session-back" type="button" class="secondary back-btn">&larr; Back</button>
      <div id="session-root"></div>
      <div class="session-footer">
        <span id="status" class="status">Ready</span>
        <button id="submit" type="button" hidden>Submit session</button>
      </div>
    </section>

    <section id="history" class="view" hidden>
      <button id="history-back" type="button" class="secondary back-btn">&larr; Back</button>
      <h2>Past sessions</h2>
      <div id="history-list"></div>
      <p id="history-empty" class="muted" hidden>No past sessions yet.</p>
    </section>

    <section id="detail" class="view" hidden>
      <button id="detail-back" type="button" class="secondary back-btn">&larr; Back</button>
      <div id="detail-root"></div>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
